[tool.black]
line-length = 88
target-version = ['py312']

[tool.isort]
profile = "black"
line_length = 88

[tool.ruff]
line-length = 88
target-version = "py312"
    select = ["E", "F", "W", "I", "N", "UP", "YTT", "BLE", "A", "B", "C4", "DTZ", "T20", "SIM", "ARG", "PL", "RUF"]
    ignore = [
        "E501",  # line too long (handled by black)
        "E402",  # module level import not at top
        "F401",  # unused imports (maybe keep for future)
        "T201",  # print found (acceptable in CLI)
        "RUF001", "RUF002", "RUF003",  # ambiguous unicode chars (Cyrillic allowed in strings)
        "BLE001",  # blind exception (sometimes okay)
        "PLC0415",  # import not at top-level (sometimes needed)
        "PLR2004",  # magic values (okay for small scripts)
        "PLR0911", "PLR0912", "PLR0915",  # too many returns/branches/statements
        "UP015",   # unnecessary mode argument (okay for clarity)
        "F541",    # f-string without placeholders (okay)
        "SIM108",  # use ternary (keep as is for readability)
        "F811",    # redefinition (sometimes intended)
        "F841",    # unused variable (okay for debugging)
        "ARG001",  # unused argument (okay for callbacks)
        "B007",    # loop var not used (okay)
    ]

[tool.ruff.per-file-ignores]
"tests/*" = ["PLR2004", "S101", "ARG", "D"]

[tool.mypy]
python_version = "3.12"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
disallow_untyped_decorators = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
warn_unreachable = true
strict_equality = true
ignore_missing_imports = true
follow_imports = "skip"
show_error_codes = true

[[tool.mypy.overrides]]
module = "tests.*"
disallow_untyped_defs = false
check_untyped_defs = false

[tool.coverage.run]
source = ["state", "handlers", "knowledge", "memory", "config", "ui", "question_generation", "quiz_generator", "pedagogy", "story_mode", "news_fetcher"]
omit = ["tests/*"]
